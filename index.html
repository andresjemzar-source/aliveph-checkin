<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>ALIVEPH Check-In</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}

:root{
  /* Mustard + Grey */

  --green:#C99A1A;
  --green-light:#F7EDC8;
  --green-mid:#E4C66A;
  --green-dark:#7A5B00;
  --green-border:#9A7300;

  --amber:#D9A520;
  --amber-light:#FFF4D6;
  --amber-mid:#EDC85A;
  --amber-dark:#7D5C00;

  --blue-light:#ECECEC;
  --blue-mid:#CFCFCF;
  --blue-dark:#616161;

  --pink-light:#F1F1F1;
  --pink-mid:#D7D7D7;
  --pink-dark:#5A5A5A;

  --red:#D9534F;
  --red-light:#FCECEC;
  --red-dark:#8A2320;

  --bg:#DADADA;
  --surface:#F7F7F7;
  --border:#C7C7C7;
  --border2:#B0B0B0;

  --text:#2C2C2C;
  --text2:#5F5F5F;
  --text3:#8E8E8E;

  --radius:12px;
  --radius-sm:8px;
  --radius-pill:999px;

  --shadow:0 2px 8px rgba(0,0,0,.08);
}

body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px;min-height:100vh;}
button{font-family:inherit;cursor:pointer;}

/* HEADER */
.app-header{background:var(--green);color:#fff;padding:14px 16px 12px;text-align:center;position:sticky;top:0;z-index:100;}
.app-header h1{font-size:19px;font-weight:700;letter-spacing:0.03em;}
.app-header p{font-size:12px;opacity:0.85;margin-top:2px;}

/* TABS */
.tab-bar{display:flex;background:var(--surface);border-bottom:0.5px solid var(--border);position:sticky;top:57px;z-index:99;}
.tab-btn{flex:1;padding:11px 4px;font-size:13px;font-weight:500;color:var(--text2);background:none;border:none;border-bottom:2px solid transparent;transition:all 0.15s;}
.tab-btn.active{color:var(--green);border-bottom-color:var(--green);}
.tab-btn i{display:block;font-size:18px;margin-bottom:2px;}

/* VIEWS */
.view{display:none;padding:14px 14px 80px;}
.view.active{display:block;}

/* SUNDAY SELECTOR */
.sunday-bar{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:11px 14px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
.sunday-bar label{font-size:12px;color:var(--text2);white-space:nowrap;}
.sunday-bar select{flex:1;font-size:14px;font-weight:500;color:var(--text);border:none;background:none;text-align:right;outline:none;max-width:200px;}
.readonly-badge{font-size:11px;background:var(--amber-light);color:var(--amber-dark);padding:3px 8px;border-radius:var(--radius-pill);white-space:nowrap;}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;}
.stat{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-sm);padding:10px 6px;text-align:center;}
.stat-num{font-size:20px;font-weight:700;color:var(--text);}
.stat-num.g{color:var(--green);}
.stat-num.a{color:var(--amber);}
.stat-label{font-size:11px;color:var(--text3);margin-top:1px;}

/* SEARCH */
.search-wrap{position:relative;margin-bottom:10px;}
.search-wrap .si{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:17px;color:var(--text3);pointer-events:none;}
.search-wrap input{width:100%;font-size:15px;padding:11px 36px;border-radius:var(--radius);border:0.5px solid var(--border2);background:var(--surface);color:var(--text);}
.search-wrap input:focus{outline:none;border-color:var(--green);}
.clear-x{position:absolute;right:11px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text3);font-size:17px;padding:2px;display:none;}

/* FILTER TOGGLE */
.filter-toggle-btn{display:flex;align-items:center;justify-content:space-between;width:100%;background:none;border:none;font-size:13px;color:var(--text2);padding:0 2px 8px;}
.filter-panel{display:none;flex-direction:column;gap:8px;margin-bottom:10px;}
.filter-panel.open{display:flex;}
.filter-panel select{width:100%;font-size:14px;padding:10px 12px;border-radius:var(--radius-sm);border:0.5px solid var(--border2);background:var(--surface);color:var(--text);}

/* RESULT COUNT */
.result-count{font-size:12px;color:var(--text2);margin-bottom:8px;padding-left:2px;}

/* SECTION HEADERS */
.section-hdr{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.07em;padding:4px 0 6px;border-bottom:0.5px solid var(--border);margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;}
.loc-count{font-size:11px;background:var(--green-light);color:var(--green-dark);padding:1px 8px;border-radius:var(--radius-pill);}
.type-lbl{font-size:12px;color:var(--text3);padding:0 2px 5px;}

/* PERSON CARD */
.person-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:11px 12px;margin-bottom:7px;display:flex;align-items:center;gap:10px;transition:border-color 0.2s,background 0.2s;}
.person-card.present{border-color:var(--green);background:var(--green-light);}
.person-card.flash{animation:flashGreen 0.6s ease;}
@keyframes flashGreen{0%{background:var(--green);border-color:var(--green);}100%{background:var(--green-light);border-color:var(--green);}}
.avatar{width:40px;height:40px;border-radius:50%;background:#e8eaf0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:var(--text2);flex-shrink:0;transition:background 0.2s,color 0.2s;}
.person-card.present .avatar{background:var(--green-mid);color:var(--green-dark);}
.person-info{flex:1;min-width:0;}
.person-name{font-size:15px;font-weight:500;color:var(--text);display:flex;align-items:center;flex-wrap:wrap;gap:4px;}
.person-card.present .person-name{color:var(--green-dark);}
.person-meta{font-size:12px;color:var(--text2);margin-top:2px;}
.person-card.present .person-meta{color:var(--green-border);}
.card-actions{display:flex;gap:6px;flex-shrink:0;}
.chk-btn{font-size:12px;font-weight:600;padding:8px 11px;border-radius:var(--radius-sm);border:0.5px solid var(--border2);background:transparent;color:var(--text);white-space:nowrap;transition:all 0.15s;}
.chk-btn.do-present{background:var(--green);border-color:var(--green);color:#fff;}
.chk-btn.do-undo{border-color:var(--green-border);color:var(--green-border);}
.chk-btn:disabled{opacity:0.4;cursor:default;}
.icon-btn{padding:8px;border-radius:var(--radius-sm);border:0.5px solid var(--border);background:transparent;color:var(--text2);font-size:16px;display:flex;align-items:center;justify-content:center;}

/* AGE PILLS */
.age-pill{font-size:11px;padding:1px 7px;border-radius:var(--radius-pill);font-weight:500;}
.age-pill.Adult{background:var(--blue-light);color:var(--blue-dark);}
.age-pill.Youth{background:var(--amber-light);color:var(--amber-dark);}
.age-pill.Kids{background:var(--pink-light);color:var(--pink-dark);}

/* HIGHLIGHT */
.hl{background:var(--amber-mid);border-radius:2px;padding:0 1px;}

/* EMPTY */
.empty-state{text-align:center;padding:36px 16px;color:var(--text2);}
.empty-state i{font-size:32px;display:block;margin:0 auto 10px;color:var(--text3);}
.empty-state p{font-size:14px;}

/* RESET BTN */
.reset-row{text-align:center;margin-top:14px;}
.reset-row button{font-size:12px;color:var(--text3);background:none;border:none;text-decoration:underline;}

/* ADD FORM */
.form-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:12px;}
.form-card h2{font-size:15px;font-weight:600;color:var(--text);margin-bottom:12px;}
.form-field{margin-bottom:10px;}
.form-field label{font-size:12px;color:var(--text2);display:block;margin-bottom:4px;font-weight:500;}
.form-field input,.form-field select{width:100%;font-size:15px;padding:11px 13px;border-radius:var(--radius-sm);border:0.5px solid var(--border2);background:var(--surface);color:var(--text);}
.form-field input:focus,.form-field select:focus{outline:none;border-color:var(--green);}
.form-field input.warn-inp{border-color:var(--amber);}
.warn-box{background:var(--amber-light);border:0.5px solid var(--amber);border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:10px;display:none;}
.warn-box p{font-size:13px;color:var(--amber-dark);margin-bottom:6px;}
.warn-match{font-size:12px;color:var(--amber-dark);background:#fff8ee;border-radius:var(--radius-sm);padding:6px 10px;margin-bottom:8px;line-height:1.5;}
.warn-actions{display:flex;gap:8px;}
.warn-actions button{flex:1;padding:9px;font-size:13px;font-weight:500;border-radius:var(--radius-sm);cursor:pointer;}
.btn-w-cancel{background:transparent;border:0.5px solid var(--amber);color:var(--amber-dark);}
.btn-w-confirm{background:var(--amber);border:none;color:#fff;}
.btn-primary{width:100%;padding:13px;font-size:15px;font-weight:600;border-radius:var(--radius);border:none;background:var(--green);color:#fff;margin-top:4px;}
.btn-primary:active{opacity:0.88;}

/* PROFILE / EDIT MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;display:none;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border-radius:var(--radius) var(--radius) 0 0;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;padding:0 0 32px;}
.modal-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:10px auto 14px;}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:0 16px 12px;border-bottom:0.5px solid var(--border);}
.modal-header h2{font-size:17px;font-weight:600;}
.modal-close{background:none;border:none;font-size:22px;color:var(--text2);padding:2px 6px;}
.modal-body{padding:16px;}
.profile-avatar{width:60px;height:60px;border-radius:50%;background:var(--green-light);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:var(--green-dark);margin:0 auto 14px;}
.profile-name{text-align:center;font-size:18px;font-weight:600;margin-bottom:4px;}
.profile-pills{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:16px;}
.profile-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:0.5px solid var(--border);}
.profile-row:last-child{border-bottom:none;}
.profile-row i{font-size:18px;color:var(--text3);width:22px;text-align:center;}
.profile-row-label{font-size:12px;color:var(--text2);}
.profile-row-val{font-size:14px;color:var(--text);margin-top:1px;}
.modal-footer{display:flex;gap:8px;padding:0 16px;margin-top:16px;}
.btn-edit{flex:1;padding:12px;font-size:14px;font-weight:600;border-radius:var(--radius-sm);border:0.5px solid var(--border2);background:transparent;color:var(--text);}
.btn-delete{padding:12px 16px;font-size:14px;font-weight:600;border-radius:var(--radius-sm);border:0.5px solid var(--red-light);background:var(--red-light);color:var(--red);}

/* HISTORY */
.history-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:13px 14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;}
.history-card:active{background:var(--bg);}
.history-date{font-size:15px;font-weight:500;color:var(--text);}
.history-meta{font-size:12px;color:var(--text2);margin-top:2px;}
.history-arrow{font-size:18px;color:var(--text3);}

/* TOAST */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:#1a1d23;color:#fff;font-size:13px;font-weight:500;padding:10px 18px;border-radius:var(--radius-pill);opacity:0;transition:all 0.25s;z-index:300;white-space:nowrap;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* LOADING */
.loading{text-align:center;padding:40px;color:var(--text2);font-size:14px;}
</style>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css"/>
</head>
<body>

<div class="app-header">
  <h1>⛪ ALIVEPH</h1>
  <p id="hdr-date"></p>
</div>

<div class="tab-bar">
  <button class="tab-btn active" id="tb-attendance" onclick="switchTab('attendance')">
    <i class="ti ti-check"></i>Attendance
  </button>
  <button class="tab-btn" id="tb-add" onclick="switchTab('add')">
    <i class="ti ti-user-plus"></i>Add Person
  </button>
  <button class="tab-btn" id="tb-history" onclick="switchTab('history')">
    <i class="ti ti-history"></i>History
  </button>
</div>

<!-- ATTENDANCE VIEW -->
<div class="view active" id="view-attendance">
  <div class="sunday-bar">
    <label><i class="ti ti-calendar"></i> Sunday</label>
    <select id="sunday-select" onchange="onSundayChange()"></select>
    <span class="readonly-badge" id="readonly-badge" style="display:none;">View only</span>
  </div>
  <div class="stats">
    <div class="stat"><div class="stat-num" id="st-total">0</div><div class="stat-label">Total</div></div>
    <div class="stat"><div class="stat-num g" id="st-present">0</div><div class="stat-label">Present</div></div>
    <div class="stat"><div class="stat-num a" id="st-absent">0</div><div class="stat-label">Absent</div></div>
  </div>
  <div class="search-wrap">
    <i class="ti ti-search si"></i>
    <input type="text" id="search-inp" placeholder="Search by name..." oninput="onSearch()" autocomplete="off"/>
    <button class="clear-x" id="clear-x" onclick="clearSearch()" aria-label="Clear search"><i class="ti ti-x"></i></button>
  </div>
  <button class="filter-toggle-btn" onclick="toggleFilters()">
    <span><i class="ti ti-adjustments-horizontal"></i> Filters</span>
    <span id="f-arrow"><i class="ti ti-chevron-down"></i></span>
  </button>
  <div class="filter-panel" id="filter-panel">
    <select id="f-loc" onchange="renderList()"><option value="">All locations</option><option>Cainta</option><option>Caloocan</option><option>Litex</option></select>
    <select id="f-type" onchange="renderList()"><option value="">All attendee types</option><option>New Attendee</option><option>Regular Attendee</option></select>
    <select id="f-age" onchange="renderList()"><option value="">All age groups</option><option>Adult</option><option>Youth</option><option>Kids</option></select>
    <select id="f-status" onchange="renderList()"><option value="">All statuses</option><option value="present">Present</option><option value="absent">Not Present</option></select>
  </div>
  <div class="result-count" id="result-count" style="display:none;"></div>
  <div id="list-area"><div class="loading"><i class="ti ti-loader" style="font-size:24px;display:block;margin:0 auto 8px;"></i>Loading...</div></div>
  <div class="reset-row"><button onclick="resetAttendance()">Reset all attendance for today</button></div>
</div>

<!-- ADD PERSON VIEW -->
<div class="view" id="view-add">
  <div class="form-card">
    <h2><i class="ti ti-user-plus"></i> Add new person</h2>
    <div class="form-field">
      <label>Full name</label>
      <input type="text" id="inp-name" placeholder="e.g. Juan dela Cruz" oninput="onNameInput()" autocomplete="off"/>
    </div>
    <div class="warn-box" id="warn-box">
      <p><i class="ti ti-alert-triangle"></i> Similar name already exists:</p>
      <div class="warn-match" id="warn-match"></div>
      <div class="warn-actions">
        <button class="btn-w-cancel" onclick="cancelWarn()">Cancel</button>
        <button class="btn-w-confirm" onclick="confirmAdd()">Add anyway</button>
      </div>
    </div>
    <div class="form-field">
      <label>Location</label>
      <select id="inp-loc"><option>Cainta</option><option>Caloocan</option><option>Litex</option></select>
    </div>
    <div class="form-field">
      <label>Attendee type</label>
      <select id="inp-type"><option>New Attendee</option><option>Regular Attendee</option></select>
    </div>
    <div class="form-field">
      <label>Age group</label>
      <select id="inp-age"><option>Adult</option><option>Youth</option><option>Kids</option></select>
    </div>
    <div class="form-field">
      <label>Contact number <span style="color:var(--text3);font-weight:400;">(optional)</span></label>
      <input type="tel" id="inp-contact" placeholder="e.g. 09171234567"/>
    </div>
    <div class="form-field">
      <label>Facebook <span style="color:var(--text3);font-weight:400;">(optional)</span></label>
      <input type="text" id="inp-fb" placeholder="e.g. facebook.com/name"/>
    </div>
    <button class="btn-primary" onclick="tryAdd()"><i class="ti ti-plus"></i> Add to list</button>
  </div>
</div>

<!-- HISTORY VIEW -->
<div class="view" id="view-history">
  <div id="history-list"><div class="loading">Loading history...</div></div>
</div>

<!-- PROFILE MODAL -->
<div class="modal-overlay" id="profile-modal" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <h2 id="modal-title">Person</h2>
      <button class="modal-close" onclick="closeProfileModal()"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer">
      <button class="btn-edit" onclick="openEditMode()"><i class="ti ti-edit"></i> Edit</button>
      <button class="btn-delete" onclick="deletePerson()"><i class="ti ti-trash"></i></button>
    </div>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="edit-modal" onclick="closeEditEvent(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <h2>Edit person</h2>
      <button class="modal-close" onclick="closeEditModal()"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="edit-id"/>
      <div class="form-field"><label>Full name</label><input type="text" id="edit-name"/></div>
      <div class="form-field"><label>Location</label><select id="edit-loc"><option>Cainta</option><option>Caloocan</option><option>Litex</option></select></div>
      <div class="form-field"><label>Attendee type</label><select id="edit-type"><option>New Attendee</option><option>Regular Attendee</option></select></div>
      <div class="form-field"><label>Age group</label><select id="edit-age"><option>Adult</option><option>Youth</option><option>Kids</option></select></div>
      <div class="form-field"><label>Contact number</label><input type="tel" id="edit-contact"/></div>
      <div class="form-field"><label>Facebook</label><input type="text" id="edit-fb"/></div>
      <button class="btn-primary" onclick="saveEdit()"><i class="ti ti-check"></i> Save changes</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, update, remove, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCvEohWjgxrV8zdJ4DK2-bopw-rfhVxz0E",
  authDomain: "aliveph-checkin.firebaseapp.com",
  databaseURL: "https://aliveph-checkin-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "aliveph-checkin",
  storageBucket: "aliveph-checkin.firebasestorage.app",
  messagingSenderId: "793965291263",
  appId: "1:793965291263:web:41fa9fbacc1df72d7c0eca"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// STATE
let people = {};
let attendance = {};
let currentSunday = '';
let isReadOnly = false;
let activePersonId = null;
let filtersOpen = false;

// UTILS
function initials(n){return n.trim().split(/\s+/).map(w=>w[0]).slice(0,2).join('').toUpperCase();}
function getSundays(){
  const sundays=[];
  const today=new Date();
  today.setHours(0,0,0,0);
  let d=new Date(today);
  while(d.getDay()!==0) d.setDate(d.getDate()-1);
  for(let i=0;i<12;i++){
    const s=new Date(d);
    s.setDate(s.getDate()-i*7);
    sundays.push(s.toISOString().split('T')[0]);
  }
  return sundays;
}
function formatSunday(iso){
  const d=new Date(iso+'T00:00:00');
  return d.toLocaleDateString('en-PH',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
}
function formatShort(iso){
  const d=new Date(iso+'T00:00:00');
  return d.toLocaleDateString('en-PH',{month:'short',day:'numeric',year:'numeric'});
}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}
function hl(text,q){
  if(!q)return text;
  const i=text.toLowerCase().indexOf(q.toLowerCase());
  if(i===-1)return text;
  return text.slice(0,i)+'<span class="hl">'+text.slice(i,i+q.length)+'</span>'+text.slice(i+q.length);
}

// INIT SUNDAY SELECTOR
function initSundaySelect(){
  const sel=document.getElementById('sunday-select');
  const sundays=getSundays();
  sel.innerHTML='';
  sundays.forEach((s,i)=>{
    const o=document.createElement('option');
    o.value=s;
    o.textContent=(i===0?'Today — ':'')+formatShort(s);
    sel.appendChild(o);
  });
  currentSunday=sundays[0];
  document.getElementById('hdr-date').textContent=formatSunday(currentSunday);
  loadAttendance();
}

function onSundayChange(){
  const sundays=getSundays();
  currentSunday=document.getElementById('sunday-select').value;
  isReadOnly=currentSunday!==sundays[0];
  document.getElementById('readonly-badge').style.display=isReadOnly?'':'none';
  document.getElementById('hdr-date').textContent=formatSunday(currentSunday);
  loadAttendance();
}

// FIREBASE
function loadPeople(){
  onValue(ref(db,'people'),snap=>{
    people=snap.val()||{};
    renderList();
    renderHistory();
  });
}

function loadAttendance(){
  get(ref(db,'attendance/'+currentSunday)).then(snap=>{
    attendance=snap.val()||{};
    renderList();
  });
}

function saveAttendance(personId,present){
  set(ref(db,'attendance/'+currentSunday+'/'+personId),present);
}

function savePerson(id,data){
  set(ref(db,'people/'+id),data);
}

function updatePerson(id,data){
  update(ref(db,'people/'+id),data);
}

function removePerson(id){
  remove(ref(db,'people/'+id));
}

// TABS
window.switchTab=function(tab){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('view-'+tab).classList.add('active');
  document.getElementById('tb-'+tab).classList.add('active');
  if(tab==='history') renderHistory();
};

// SUNDAY
window.onSundayChange=onSundayChange;

// SEARCH & FILTERS
window.onSearch=function(){
  const q=document.getElementById('search-inp').value;
  document.getElementById('clear-x').style.display=q?'':'none';
  renderList();
};
window.clearSearch=function(){
  document.getElementById('search-inp').value='';
  document.getElementById('clear-x').style.display='none';
  renderList();
  document.getElementById('search-inp').focus();
};
window.toggleFilters=function(){
  filtersOpen=!filtersOpen;
  document.getElementById('filter-panel').classList.toggle('open',filtersOpen);
  document.getElementById('f-arrow').innerHTML=filtersOpen?'<i class="ti ti-chevron-up"></i>':'<i class="ti ti-chevron-down"></i>';
};
window.renderList=renderList;

function renderList(){
  const q=document.getElementById('search-inp').value.trim();
  const fLoc=document.getElementById('f-loc').value;
  const fType=document.getElementById('f-type').value;
  const fAge=document.getElementById('f-age').value;
  const fStatus=document.getElementById('f-status').value;

  const arr=Object.entries(people).map(([id,p])=>({...p,id,present:!!attendance[id]}));
  const filtered=arr.filter(p=>{
    if(q&&!p.name.toLowerCase().includes(q.toLowerCase()))return false;
    if(fLoc&&p.location!==fLoc)return false;
    if(fType&&p.type!==fType)return false;
    if(fAge&&p.age!==fAge)return false;
    if(fStatus==='present'&&!p.present)return false;
    if(fStatus==='absent'&&p.present)return false;
    return true;
  });

  // stats
  const total=arr.length;
  const presentCount=arr.filter(x=>x.present).length;
  document.getElementById('st-total').textContent=total;
  document.getElementById('st-present').textContent=presentCount;
  document.getElementById('st-absent').textContent=total-presentCount;

  // result count
  const rc=document.getElementById('result-count');
  if(q){rc.style.display='';rc.textContent=filtered.length===0?'No results found':`${filtered.length} result${filtered.length!==1?'s':''} for "${q}"`;}
  else rc.style.display='none';

  let html='';
  if(!arr.length){
    html='<div class="empty-state"><i class="ti ti-users"></i><p>No people added yet.<br>Go to Add Person to get started.</p></div>';
  } else if(!filtered.length){
    html='<div class="empty-state"><i class="ti ti-search"></i><p>No one matches your search or filters.</p></div>';
  } else if(q){
    filtered.forEach(p=>{html+=cardHTML(p,q);});
  } else {
    const locs=['Cainta','Caloocan','Litex'].filter(l=>filtered.some(p=>p.location===l));
    const types=['New Attendee','Regular Attendee'];
    locs.forEach(loc=>{
      const lp=filtered.filter(p=>p.location===loc);
      const lpPresent=lp.filter(x=>x.present).length;
      html+=`<div style="margin-bottom:14px;">
        <div class="section-hdr"><span><i class="ti ti-map-pin"></i> ${loc}</span><span class="loc-count">${lpPresent}/${lp.length}</span></div>`;
      types.forEach(type=>{
        const gp=lp.filter(p=>p.type===type);
        if(!gp.length)return;
        html+=`<div style="margin-bottom:8px;"><div class="type-lbl">${type}</div>`;
        gp.forEach(p=>{html+=cardHTML(p,'');});
        html+='</div>';
      });
      html+='</div>';
    });
  }
  document.getElementById('list-area').innerHTML=html;
}

function cardHTML(p,q){
  const ro=isReadOnly;
  const metaExtra=q?` · ${p.location} · ${p.type}`:'';
  return `<div class="person-card${p.present?' present':''}" id="card-${p.id}" onclick="openProfile('${p.id}')">
    <div class="avatar">${initials(p.name)}</div>
    <div class="person-info">
      <div class="person-name">${hl(p.name,q)} <span class="age-pill ${p.age||'Adult'}">${p.age||'Adult'}</span></div>
      <div class="person-meta">${p.present?'<i class="ti ti-check"></i> Present':'Not yet checked in'}${metaExtra}</div>
    </div>
    <div class="card-actions" onclick="event.stopPropagation()">
      <button class="chk-btn ${p.present?'do-undo':'do-present'}" onclick="togglePresent('${p.id}')" ${ro?'disabled title="Past Sunday — read only"':''}>${p.present?'Undo':'Present'}</button>
    </div>
  </div>`;
}

window.togglePresent=function(id){
  if(isReadOnly)return;
  const current=!!attendance[id];
  const newVal=!current;
  attendance[id]=newVal;
  saveAttendance(id,newVal);
  if(newVal){
    const card=document.getElementById('card-'+id);
    if(card){card.classList.add('flash');setTimeout(()=>card.classList.remove('flash'),650);}
    const name=people[id]?.name||'';
    showToast('✓ '+name+' checked in!');
  }
  renderList();
};

// RESET
window.resetAttendance=function(){
  if(isReadOnly){showToast('Past Sundays are read-only.');return;}
  if(!confirm('Reset all attendance for this Sunday?'))return;
  attendance={};
  set(ref(db,'attendance/'+currentSunday),null);
  renderList();
  showToast('Attendance reset.');
};

// ADD PERSON
function findSimilar(name){
  const q=name.trim().toLowerCase();
  return Object.entries(people).filter(([,p])=>p.name.toLowerCase()===q||p.name.toLowerCase().includes(q)||q.includes(p.name.toLowerCase())).map(([,p])=>p);
}

window.onNameInput=function(){
  const name=document.getElementById('inp-name').value.trim();
  const inp=document.getElementById('inp-name');
  inp.classList.remove('warn-inp');
  document.getElementById('warn-box').style.display='none';
  if(name.length<2)return;
  const matches=findSimilar(name);
  if(matches.length){
    inp.classList.add('warn-inp');
    document.getElementById('warn-match').innerHTML=matches.map(m=>`<strong>${m.name}</strong> — ${m.location} · ${m.type} · ${m.age}`).join('<br>');
    document.getElementById('warn-box').style.display='';
  }
};

window.cancelWarn=function(){
  document.getElementById('inp-name').value='';
  document.getElementById('inp-name').classList.remove('warn-inp');
  document.getElementById('warn-box').style.display='none';
};

window.confirmAdd=function(){doAdd();};

window.tryAdd=function(){
  const name=document.getElementById('inp-name').value.trim();
  if(!name){showToast('Please enter a name.');return;}
  const matches=findSimilar(name);
  if(matches.length){
    document.getElementById('warn-box').style.display='';
    return;
  }
  doAdd();
};

function doAdd(){
  const name=document.getElementById('inp-name').value.trim();
  if(!name)return;
  const id='p'+Date.now();
  const data={
    name,
    location:document.getElementById('inp-loc').value,
    type:document.getElementById('inp-type').value,
    age:document.getElementById('inp-age').value,
    contact:document.getElementById('inp-contact').value.trim(),
    fb:document.getElementById('inp-fb').value.trim(),
    addedAt:new Date().toISOString()
  };
  savePerson(id,data);
  document.getElementById('inp-name').value='';
  document.getElementById('inp-contact').value='';
  document.getElementById('inp-fb').value='';
  document.getElementById('warn-box').style.display='none';
  document.getElementById('inp-name').classList.remove('warn-inp');
  showToast('✓ '+name+' added!');
  switchTab('attendance');
}

// PROFILE MODAL
window.openProfile=function(id){
  activePersonId=id;
  const p=people[id];
  if(!p)return;
  const present=!!attendance[id];
  document.getElementById('modal-title').textContent=p.name;
  document.getElementById('modal-body').innerHTML=`
    <div class="profile-avatar">${initials(p.name)}</div>
    <div class="profile-name">${p.name}</div>
    <div class="profile-pills">
      <span class="age-pill ${p.age||'Adult'}">${p.age||'Adult'}</span>
      <span style="font-size:11px;padding:2px 8px;border-radius:999px;background:${present?'var(--green-light)':'#f0f1f4'};color:${present?'var(--green-dark)':'var(--text2)'};">${present?'✓ Present':'Not checked in'}</span>
    </div>
    <div class="profile-row"><i class="ti ti-map-pin"></i><div><div class="profile-row-label">Location</div><div class="profile-row-val">${p.location}</div></div></div>
    <div class="profile-row"><i class="ti ti-users"></i><div><div class="profile-row-label">Attendee type</div><div class="profile-row-val">${p.type}</div></div></div>
    <div class="profile-row"><i class="ti ti-phone"></i><div><div class="profile-row-label">Contact number</div><div class="profile-row-val">${p.contact||'—'}</div></div></div>
    <div class="profile-row"><i class="ti ti-brand-facebook"></i><div><div class="profile-row-label">Facebook</div><div class="profile-row-val">${p.fb||'—'}</div></div></div>
  `;
  document.getElementById('profile-modal').classList.add('open');
};

window.closeProfileModal=function(){
  document.getElementById('profile-modal').classList.remove('open');
};
window.closeModal=function(e){
  if(e.target===document.getElementById('profile-modal')) closeProfileModal();
};

window.deletePerson=function(){
  if(!activePersonId)return;
  const name=people[activePersonId]?.name||'this person';
  if(!confirm('Remove '+name+' from the list?'))return;
  removePerson(activePersonId);
  closeProfileModal();
  showToast(name+' removed.');
};

// EDIT MODAL
window.openEditMode=function(){
  const p=people[activePersonId];
  if(!p)return;
  closeProfileModal();
  document.getElementById('edit-id').value=activePersonId;
  document.getElementById('edit-name').value=p.name;
  document.getElementById('edit-loc').value=p.location;
  document.getElementById('edit-type').value=p.type;
  document.getElementById('edit-age').value=p.age||'Adult';
  document.getElementById('edit-contact').value=p.contact||'';
  document.getElementById('edit-fb').value=p.fb||'';
  document.getElementById('edit-modal').classList.add('open');
};

window.closeEditModal=function(){
  document.getElementById('edit-modal').classList.remove('open');
};
window.closeEditEvent=function(e){
  if(e.target===document.getElementById('edit-modal')) closeEditModal();
};

window.saveEdit=function(){
  const id=document.getElementById('edit-id').value;
  const name=document.getElementById('edit-name').value.trim();
  if(!name){showToast('Name cannot be empty.');return;}
  updatePerson(id,{
    name,
    location:document.getElementById('edit-loc').value,
    type:document.getElementById('edit-type').value,
    age:document.getElementById('edit-age').value,
    contact:document.getElementById('edit-contact').value.trim(),
    fb:document.getElementById('edit-fb').value.trim(),
  });
  closeEditModal();
  showToast('✓ Changes saved!');
};

// HISTORY
function renderHistory(){
  const sundays=getSundays();
  const listEl=document.getElementById('history-list');
  const past=sundays.slice(1);
  if(!past.length){listEl.innerHTML='<div class="empty-state"><i class="ti ti-history"></i><p>No past Sundays yet.</p></div>';return;}
  Promise.all(past.map(s=>get(ref(db,'attendance/'+s)).then(snap=>({sunday:s,data:snap.val()||{}})))).then(results=>{
    let html='';
    results.forEach(({sunday,data})=>{
      const total=Object.keys(people).length;
      const present=Object.values(data).filter(Boolean).length;
      html+=`<div class="history-card" onclick="viewHistory('${sunday}')">
        <div><div class="history-date">${formatShort(sunday)}</div><div class="history-meta">${present} of ${total} present</div></div>
        <i class="ti ti-chevron-right history-arrow"></i>
      </div>`;
    });
    if(!html) html='<div class="empty-state"><i class="ti ti-history"></i><p>No attendance recorded yet.</p></div>';
    listEl.innerHTML=html;
  });
}

window.viewHistory=function(sunday){
  const sel=document.getElementById('sunday-select');
  const opts=Array.from(sel.options);
  const match=opts.find(o=>o.value===sunday);
  if(match){
    sel.value=sunday;
    onSundayChange();
    switchTab('attendance');
  }
};

// BOOT
document.getElementById('hdr-date').textContent=formatSunday(new Date().toISOString().split('T')[0]);
initSundaySelect();
loadPeople();
</script>
